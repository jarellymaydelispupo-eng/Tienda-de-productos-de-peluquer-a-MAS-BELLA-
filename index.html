<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÁS BELLA - Tienda Virtual</title>
    <style>
        :root { --oro: #d4af37; --rosa-fondo: #fff5f8; --rosa-fuerte: #d81b60; --oscuro: #2c3e50; --verde: #27ae60; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: var(--rosa-fondo); color: #333; }
        header { background: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--oro); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .logo { font-size: 1.8rem; font-weight: bold; color: var(--rosa-fuerte); margin: 0; }
        .sublogo { font-size: 0.8rem; color: #666; margin: 3px 0 0 0; }
        
        .lista-productos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; max-width: 600px; margin: auto; }
        .categoria-titulo { grid-column: span 2; background: var(--oscuro); color: white; padding: 8px; margin-top: 15px; text-align: center; font-weight: bold; text-transform: uppercase; border-radius: 6px; font-size: 0.85rem; }
        
        .producto-item { background: white; display: flex; flex-direction: column; padding: 8px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; text-align: center; }
        .foto-producto { width: 100%; height: 140px; object-fit: cover; background-color: #f9f9f9; border-radius: 8px; margin-bottom: 8px; }
        
        .nombre { font-weight: bold; font-size: 0.85rem; height: 34px; overflow: hidden; margin-bottom: 4px; color: var(--oscuro); line-height: 1.2; }
        .precio { font-weight: bold; color: var(--rosa-fuerte); font-size: 0.95rem; margin-top: 5px; }
        .promo-tag { font-size: 0.7rem; font-weight: bold; margin: 5px 0; min-height: 25px; color: #666; }
        
        .cant-input { width: 100%; text-align: center; border: 2px solid var(--oro); border-radius: 6px; padding: 8px; font-weight: bold; box-sizing: border-box; }
        .aviso-stock { color: #ff4444; font-size: 0.65rem; font-weight: bold; height: 15px; margin-top: 2px; }

        .resumen-total { background: var(--oscuro); color: white; padding: 15px; position: fixed; bottom: 0; width: 100%; text-align: center; z-index: 100; }
        .btn-whatsapp { background: #25d366; color: white; text-decoration: none; padding: 12px 30px; border-radius: 50px; display: inline-block; margin-top: 8px; font-weight: bold; }
        
        .contenedor-entrega { max-width: 600px; margin: 0 auto 250px auto; padding: 0 10px; }
        .seccion-entrega { background: white; padding: 15px; border-radius: 12px; border: 2px solid var(--oro); margin-top: 10px; }
        .selector, .input-datos { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>

    <header>
        <p class="logo">🌺 MÁS BELLA 🌺</p>
        <p class="sublogo">ESTÉTICA PROFESIONAL | CAMAGÜEY</p>
    </header>

    <div class="lista-productos" id="contenedor-productos">
        <div id="cargando" style="grid-column: span 2; text-align:center; padding:40px;">🌸 Cargando inventario...</div>
    </div>

    <div class="contenedor-entrega">
        <div class="seccion-entrega">
            <h3 style="margin-top:0; text-align: center;">🛵 Servicio de Entrega</h3>
            <select id="metodoEntrega" class="selector" onchange="calc()">
                <option value="0">🏪 Recogida en Tienda ($0)</option>
                <option value="300">📍 Centro ($300)</option>
            </select>
            <div id="campos-domicilio" style="display:none;">
                <input type="text" id="nombreCliente" class="input-datos" placeholder="Tu Nombre">
                <textarea id="direccionCliente" class="input-datos" placeholder="Dirección y teléfono"></textarea>
            </div>
        </div>
    </div>

    <div class="resumen-total">
        TOTAL: $<span id="monto-total">0</span><br>
        <a href="javascript:void(0);" onclick="enviarPedido()" class="btn-whatsapp">📲 PEDIR POR WHATSAPP</a>
    </div>

<script>
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh6ypXBcxssEtPYB9l6ahApz-tHFPEoi5voACOA5ynv_gxA7Uo2nzXIPtlVTTTxOeN2vqjyygpGvOI/pub?output=csv';
    let productos = [];

    async function obtenerDatos() {
        const res = await fetch(URL_CSV);
        const data = await res.text();
        const filas = data.split('\n').slice(1);
        productos = filas.map(f => {
            const c = f.split(',');
            return { cat: c[0], nombre: c[1], precio: parseFloat(c[2]), stock: parseInt(c[3]), foto: c[5], mayoreo: parseFloat(c[6]), min: parseInt(c[7]) };
        }).filter(p => p.nombre);
        document.getElementById('cargando').style.display = 'none';
        mostrar();
    }

    function mostrar() {
        let html = ""; let cat = "";
        productos.forEach((p, i) => {
            if (p.cat !== cat) { cat = p.cat; html += `<div class="categoria-titulo">${p.cat}</div>`; }
            html += `
                <div class="producto-item">
                    <img src="${p.foto || 'https://placehold.co/400x400'}" class="foto-producto">
                    <span class="nombre">${p.nombre}</span>
                    <span class="precio" id="p-vis-${i}">$${p.precio}</span>
                    <div class="promo-tag" id="promo-${i}">${(p.mayoreo && p.min) ? `Lleva ${p.min}+ a $${p.mayoreo}` : ""}</div>
                    <input type="number" class="cant-input" id="cant-${i}" value="0" min="0" max="${p.stock}" oninput="calc()">
                    <div class="aviso-stock" id="aviso-${i}"></div>
                </div>`;
        });
        document.getElementById('contenedor-productos').innerHTML = html;
    }

    function calc() {
        let total = 0;
        productos.forEach((p, i) => { 
            let input = document.getElementById(`cant-${i}`);
            let pVis = document.getElementById(`p-vis-${i}`);
            let pTag = document.getElementById(`promo-${i}`);
            let aviso = document.getElementById(`aviso-${i}`);
            let val = parseInt(input.value) || 0;

            if (val > p.stock) { val = p.stock; input.value = p.stock; aviso.innerText = "¡Stock máximo alcanzado!"; }
            else { aviso.innerText = ""; }

            if (p.mayoreo && p.min && val >= p.min) {
                total += val * p.mayoreo;
                pVis.style.color = "var(--verde)"; pVis.innerText = `$${p.mayoreo} (¡Mayoreo!)`;
                pTag.innerHTML = `<span style="color:var(--verde)">🎉 ¡Ahorro aplicado!</span>`;
            } else {
                total += val * p.precio;
                pVis.style.color = "var(--rosa-fuerte)"; pVis.innerText = `$${p.precio}`;
                if(p.min) pTag.innerHTML = `Faltan <b>${p.min - val}</b> para descuento`;
            }
        });
        const dom = parseInt(document.getElementById("metodoEntrega").value);
        document.getElementById("campos-domicilio").style.display = dom > 0 ? "block" : "none";
        document.getElementById('monto-total').innerText = (total + dom).toLocaleString();
    }

    function enviarPedido() {
        let txt = `*🌺 PEDIDO - MÁS BELLA 🌺*\n`;
        productos.forEach((p, i) => {
            let c = parseInt(document.getElementById(`cant-${i}`).value) || 0;
            if (c > 0) txt += `✅ ${c}x ${p.nombre}\n`;
        });
        txt += `\n💰 *TOTAL: $${document.getElementById("monto-total").innerText}*`;
        window.location.href = `https://wa.me/5356247880?text=${encodeURIComponent(txt)}`;
    }
    window.onload = obtenerDatos;
</script>
</body>
</html>
