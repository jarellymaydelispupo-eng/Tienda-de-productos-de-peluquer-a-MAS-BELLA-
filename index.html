<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÁS BELLA - Tienda Virtual</title>
    <style>
        :root { 
            --oro: #d4af37; 
            --rosa-fondo: #fff5f8;
            --rosa-fuerte: #d81b60;
            --oscuro: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            background-color: var(--rosa-fondo); 
            color: #333; 
        }

        header { 
            background: white; 
            padding: 15px; 
            text-align: center; 
            border-bottom: 3px solid var(--oro); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }

        .logo { font-size: 1.8rem; font-weight: bold; color: var(--rosa-fuerte); margin: 0; }
        .sublogo { font-size: 0.9rem; color: #666; margin: 5px 0 0 0; }
        
        /* DISEÑO DE CUADRÍCULA */
        .lista-productos { 
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 productos por fila */
            gap: 12px;
            padding: 12px;
            max-width: 600px;
            margin: auto;
            padding-bottom: 160px; /* Espacio para el total abajo */
        }
        
        .categoria-titulo { 
            grid-column: span 2; /* Ocupa las dos columnas */
            background: var(--oscuro); 
            color: white; 
            padding: 10px; 
            margin-top: 10px; 
            text-align: center; 
            font-weight: bold; 
            text-transform: uppercase;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        /* TARJETA DE PRODUCTO */
        .producto-item { 
            background: white; 
            display: flex; 
            flex-direction: column; 
            padding: 10px; 
            border-radius: 12px; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.06); 
            border: 1px solid #eee;
            position: relative;
        }

        .agotado { opacity: 0.5; }
        
        /* FOTO AJUSTADA PARA QUE SALGA COMPLETA */
        .foto-producto { 
            width: 100%; 
            height: 140px; 
            object-fit: contain; /* Esto hace que la foto se vea ENTERA */
            background-color: #f9f9f9; 
            border-radius: 8px; 
            margin-bottom: 8px; 
        }
        
        .badge-agotado { 
            background: #ff4444; 
            color: white; 
            padding: 2px 5px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            position: absolute;
            top: 15px;
            right: 15px;
        }
        
        .nombre { 
            font-weight: bold; 
            font-size: 0.9rem; 
            margin-bottom: 5px; 
            height: 34px; /* Altura fija para que los botones se alineen */
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .precio { 
            font-weight: bold; 
            color: var(--rosa-fuerte); 
            font-size: 1.1rem; 
            margin-bottom: 10px;
            display: block;
        }

        .cant-input { 
            width: 100%; 
            text-align: center; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            padding: 8px; 
            font-weight: bold; 
            box-sizing: border-box;
        }

        /* BARRA DE TOTAL FIJA */
        .resumen-total { 
            background: var(--oscuro); 
            color: white; 
            padding: 15px; 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            text-align: center; 
            z-index: 100; 
            box-sizing: border-box; 
            box-shadow: 0 -3px 10px rgba(0,0,0,0.2);
        }

        .btn-whatsapp { 
            background: #25d366; 
            color: white; 
            text-decoration: none; 
            padding: 12px 30px; 
            border-radius: 50px; 
            display: inline-block; 
            margin-top: 10px; 
            font-weight: bold;
            font-size: 1rem;
        }
        
        #panel-duena { display: none; background: #fff; margin: 20px; padding: 15px; border-radius: 10px; border: 2px dashed var(--oro); text-align: center; }
        .btn-admin { background: var(--oscuro); color: white; padding: 10px; border-radius: 5px; text-decoration: none; display: block; margin: 5px 0; }
    </style>
</head>
<body>

    <header>
        <p class="logo">🌺 MÁS BELLA 🌺</p>
        <p class="sublogo">Estética Profesional | Camagüey</p>
    </header>

    <div id="cargando" style="text-align:center; padding:40px;">Buscando productos...</div>
    
    <div class="lista-productos" id="contenedor-productos"></div>

    <div style="text-align: center; margin-bottom: 160px;">
        <button onclick="accederDuena()" style="background:none; border:none; color:#ddd; font-size:0.7rem;">⚙️ Acceso Dueña</button>
    </div>

    <div id="panel-duena">
        <h3>📊 Panel de Control</h3>
        <a href="https://docs.google.com/spreadsheets/d/1vSh6ypXBcxssEtPYB9l6ahApz-tHFPEoi5voACOA5ynv_gxA7Uo2nzXIPtlVTTTxOeN2vqjyygpGvOI/edit" class="btn-admin" target="_blank">EDITAR EXCEL</a>
        <div id="resumen-inversion" style="font-weight:bold; color: #27ae60; margin-top:10px;"></div>
    </div>

    <div class="resumen-total">
        TOTAL: $<span id="monto-total">0</span><br>
        <a href="javascript:void(0);" onclick="enviarPedido()" class="btn-whatsapp">📲 PEDIR POR WHATSAPP</a>
    </div>

<script>
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh6ypXBcxssEtPYB9l6ahApz-tHFPEoi5voACOA5ynv_gxA7Uo2nzXIPtlVTTTxOeN2vqjyygpGvOI/pub?output=csv';
    let productos = [];

    async function obtenerDatos() {
        try {
            const respuesta = await fetch(URL_CSV);
            const data = await respuesta.text();
            const filas = data.split('\n').slice(1);
            
            let inversionTotal = 0;

            productos = filas.map(fila => {
                const col = fila.split(',');
                if(col.length < 3) return null;

                const stock = parseInt(col[3]) || 0;
                const costo = parseFloat(col[4]) || 0;
                inversionTotal += (stock * costo);

                return {
                    cat: col[0] ? col[0].trim() : "Otros",
                    nombre: col[1] ? col[1].trim() : "",
                    precio: parseFloat(col[2]) || 0,
                    stock: stock,
                    foto: col[5] ? col[5].trim() : ""
                };
            }).filter(p => p !== null && p.nombre !== "");

            document.getElementById('resumen-inversion').innerText = `Inversión: $${inversionTotal.toLocaleString()}`;
            document.getElementById('cargando').style.display = 'none';
            mostrarProductos();
        } catch (e) { console.error(e); }
    }

    function mostrarProductos() {
        const contenedor = document.getElementById('contenedor-productos');
        let html = ""; let catActual = "";
        
        productos.forEach((p, i) => {
            if (p.cat !== catActual) { 
                catActual = p.cat; 
                html += `<div class="categoria-titulo">${p.cat}</div>`; 
            }
            
            const agotado = p.stock <= 0;
            const imgHtml = p.foto ? `<img src="${p.foto}" class="foto-producto" referrerpolicy="no-referrer" alt="${p.nombre}">` : `<div class="foto-producto" style="display:flex; align-items:center; justify-content:center; color:#ccc;">Sin Foto</div>`;

            html += `
                <div class="producto-item ${agotado ? 'agotado' : ''}">
                    ${agotado ? '<span class="badge-agotado">AGOTADO</span>' : ''}
                    ${imgHtml}
                    <span class="nombre">${p.nombre}</span>
                    <span class="precio">$${p.precio}</span>
                    <input type="number" class="cant-input" id="cant-${i}" placeholder="Cant." min="0" max="${p.stock}" ${agotado ? 'disabled' : ''} onchange="actualizarTotal()">
                </div>`;
        });
        contenedor.innerHTML = html;
    }

    function actualizarTotal() {
        let suma = 0;
        productos.forEach((p, i) => {
            suma += (parseInt(document.getElementById(`cant-${i}`).value) || 0) * p.precio;
        });
        document.getElementById('monto-total').innerText = suma.toLocaleString();
    }

    function accederDuena() {
        const clave = prompt("Clave de Dueña:");
        if (clave === "061021041122") {
            document.getElementById('panel-duena').style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
        } else { alert("Clave incorrecta"); }
    }

    function enviarPedido() {
        let texto = `*🌺 NUEVO PEDIDO - MÁS BELLA 🌺*\n----------------------------\n`;
        let hay = false;
        productos.forEach((p, i) => {
            const c = parseInt(document.getElementById(`cant-${i}`).value) || 0;
            if (c > 0) {
                texto += `✅ ${c}x ${p.nombre} ($${(c * p.precio).toLocaleString()})\n`;
                hay = true;
            }
        });
        if (!hay) return alert("Por favor, selecciona al menos un producto.");
        texto += `\n💰 *TOTAL A PAGAR: $${document.getElementById("monto-total").innerText}*`;
        window.location.href = `https://wa.me/5356247880?text=${encodeURIComponent(texto)}`;
    }

    window.onload = obtenerDatos;
</script>
</body>
    </html>
