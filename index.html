<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÁS BELLA - Tienda Virtual</title>
    <style>
        :root { --oro: #d4af37; --rosa-fondo: #fff5f8; --rosa-fuerte: #d81b60; --oscuro: #2c3e50; --verde: #27ae60; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: var(--rosa-fondo); color: #333; }
        header { background: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--oro); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .logo { font-size: 1.8rem; font-weight: bold; color: var(--rosa-fuerte); margin: 0; }
        .sublogo { font-size: 0.8rem; color: #666; margin: 3px 0 0 0; }
        
        .lista-productos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; max-width: 600px; margin: auto; }
        .categoria-titulo { grid-column: span 2; background: var(--oscuro); color: white; padding: 8px; margin-top: 15px; text-align: center; font-weight: bold; text-transform: uppercase; border-radius: 6px; font-size: 0.85rem; }
        
        .producto-item { background: white; display: flex; flex-direction: column; padding: 8px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; text-align: center; overflow: hidden; }
        .foto-producto { width: 100%; height: 140px; object-fit: cover; background-color: #f9f9f9; border-radius: 8px; margin-bottom: 8px; }
        
        .producto-item.agotado { opacity: 0.5; filter: grayscale(0.5); }
        .badge-agotado { background: #ff4444; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; font-weight: bold; }

        .nombre { font-weight: bold; font-size: 0.85rem; height: 34px; overflow: hidden; margin-bottom: 4px; color: var(--oscuro); line-height: 1.2; }
        .precio { font-weight: bold; color: var(--rosa-fuerte); font-size: 0.95rem; }
        .promo-tag { font-size: 0.65rem; color: var(--verde); font-weight: bold; margin-bottom: 5px; min-height: 15px; }
        
        .cant-input { width: 100%; text-align: center; border: 1px solid #ccc; border-radius: 6px; padding: 8px; font-weight: bold; box-sizing: border-box; margin-top: 5px; }
        .aviso-stock { color: #ff4444; font-size: 0.65rem; font-weight: bold; min-height: 15px; margin-top: 2px; }

        .resumen-total { background: var(--oscuro); color: white; padding: 15px; position: fixed; bottom: 0; width: 100%; text-align: center; z-index: 100; box-sizing: border-box; }
        .btn-whatsapp { background: #25d366; color: white; text-decoration: none; padding: 12px 30px; border-radius: 50px; display: inline-block; margin-top: 8px; font-weight: bold; }
        
        .contenedor-entrega { max-width: 600px; margin: 0 auto 250px auto; padding: 0 10px; }
        .seccion-entrega { background: white; padding: 15px; border-radius: 12px; border: 2px solid var(--oro); margin-top: 10px; }
        .selector, .input-datos { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>

    <header>
        <p class="logo">🌺 MÁS BELLA 🌺</p>
        <p class="sublogo">ESTÉTICA PROFESIONAL | CAMAGÜEY</p>
    </header>

    <div class="lista-productos" id="contenedor-productos">
        <div id="cargando" style="grid-column: span 2; text-align:center; padding:40px; color: var(--rosa-fuerte);">🌸 Cargando inventario...</div>
    </div>

    <div class="contenedor-entrega">
        <div class="seccion-entrega">
            <h3 style="margin-top:0; font-size: 1.1rem; color: var(--rosa-fuerte); text-align: center;">🛵 Servicio de Entrega</h3>
            <select id="metodoEntrega" class="selector" onchange="calc()">
                <option value="0">🏪 Recogida en Tienda ($0)</option>
                <optgroup label="Zonas de Domicilio">
                    <option value="300">📍 Centro del pueblo ($300)</option>
                    <option value="350">📍 Agramonte ($350)</option>
                    <option value="400">📍 Bella Vista ($400)</option>
                    <option value="400">📍 Buenos Aires ($400)</option>
                    <option value="400">📍 Camino de la Matanza ($400)</option>
                    <option value="350">📍 Casino Campestre ($350)</option>
                    <option value="400">📍 El Jardín ($400)</option>
                    <option value="450">📍 El Micro ($450)</option>
                    <option value="350">📍 Floiran Quiroz ($350)</option>
                    <option value="400">📍 Florat ($400)</option>
                    <option value="400">📍 Garrido ($400)</option>
                    <option value="450">📍 Imán ($450)</option>
                    <option value="400">📍 Inra ($400)</option>
                    <option value="500">📍 Isabel Hortensia ($500)</option>
                    <option value="500">📍 Jayama ($500)</option>
                    <option value="400">📍 Juanito ($400)</option>
                    <option value="450">📍 La Belén ($450)</option>
                    <option value="350">📍 La Caridad ($350)</option>
                    <option value="450">📍 La Esperanza ($450)</option>
                    <option value="450">📍 La Guernina ($450)</option>
                    <option value="400">📍 La Mosca ($400)</option>
                    <option value="400">📍 La Vigía ($400)</option>
                    <option value="450">📍 La Yaba ($450)</option>
                    <option value="450">📍 La Zambrana ($450)</option>
                    <option value="350">📍 Las Mercedes ($350)</option>
                    <option value="500">📍 Lenin ($500)</option>
                    <option value="450">📍 Los Coquitos ($450)</option>
                    <option value="400">📍 Marquesado ($400)</option>
                    <option value="400">📍 Mascota ($400)</option>
                    <option value="400">📍 Modelo ($400)</option>
                    <option value="400">📍 Monte Carlos ($400)</option>
                    <option value="400">📍 Montejo ($400)</option>
                    <option value="450">📍 Nadales ($450)</option>
                    <option value="450">📍 Nitrógeno ($450)</option>
                    <option value="450">📍 Nueva Esperanza ($450)</option>
                    <option value="400">📍 Palomino ($400)</option>
                    <option value="350">📍 Porvenir ($350)</option>
                    <option value="350">📍 Previsora ($350)</option>
                    <option value="400">📍 Puerto Príncipe ($400)</option>
                    <option value="350">📍 Sanchez Soto ($350)</option>
                    <option value="500">📍 Saratoga ($500)</option>
                    <option value="350">📍 Simoni ($350)</option>
                    <option value="400">📍 Versalles ($400)</option>
                    <option value="400">📍 Villa Mariana ($400)</option>
                    <option value="450">📍 Vista Bella ($450)</option>
                    <option value="350">📍 Vista Hermosa ($350)</option>
                </optgroup>
            </select>
            <div id="campos-domicilio" style="display:none;">
                <input type="text" id="nombreCliente" class="input-datos" placeholder="Tu Nombre">
                <textarea id="direccionCliente" class="input-datos" placeholder="Dirección exacta y teléfono"></textarea>
            </div>
        </div>
    </div>

    <div class="resumen-total">
        TOTAL A PAGAR: $<span id="monto-total">0</span><br>
        <a href="javascript:void(0);" onclick="enviarPedido()" class="btn-whatsapp">📲 PEDIR POR WHATSAPP</a>
    </div>

<script>
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh6ypXBcxssEtPYB9l6ahApz-tHFPEoi5voACOA5ynv_gxA7Uo2nzXIPtlVTTTxOeN2vqjyygpGvOI/pub?output=csv';
    let productos = [];

    async function obtenerDatos() {
        try {
            const respuesta = await fetch(URL_CSV);
            const data = await respuesta.text();
            const filas = data.split('\n').slice(1);

            productos = filas.map(fila => {
                const col = fila.split(',');
                if(col.length < 3) return null;
                return { 
                    cat: col[0]?.trim(), 
                    nombre: col[1]?.trim(), 
                    precio: parseFloat(col[2]) || 0, 
                    stock: parseInt(col[3]) || 0, 
                    foto: col[5]?.trim(),
                    precioMayoreo: parseFloat(col[6]) || null, 
                    cantMinima: parseInt(col[7]) || null      
                };
            }).filter(p => p && p.nombre !== "");

            document.getElementById('cargando').style.display = 'none';
            mostrar();
        } catch (e) { console.error(e); }
    }

    function mostrar() {
        const cont = document.getElementById('contenedor-productos');
        let html = ""; let cat = "";
        productos.forEach((p, i) => {
            if (p.cat !== cat) { cat = p.cat; html += `<div class="categoria-titulo">${p.cat}</div>`; }
            const agotado = p.stock <= 0;
            const imagen = p.foto ? p.foto : 'https://placehold.co/400x400/fff5f8/d81b60?text=Sin+Foto';
            
            const promo = (p.precioMayoreo && p.cantMinima) ? 
                `Lleva ${p.cantMinima}+ a $${p.precioMayoreo}` : "";

            html += `
                <div class="producto-item ${agotado ? 'agotado' : ''}">
                    ${agotado ? '<span class="badge-agotado">AGOTADA</span>' : ''}
                    <img src="${imagen}" class="foto-producto" referrerpolicy="no-referrer">
                    <span class="nombre">${p.nombre}</span>
                    <span class="precio" id="p-visual-${i}">$${p.precio}</span>
                    <div class="promo-tag">${promo}</div>
                    <input type="number" class="cant-input" id="cant-${i}" value="0" min="0" max="${p.stock}" ${agotado ? 'disabled' : ''} oninput="calc()">
                    <div class="aviso-stock" id="aviso-${i}"></div>
                </div>`;
        });
        cont.innerHTML = html;
    }

    function calc() {
        let totalGeneral = 0;
        productos.forEach((p, i) => { 
            let input = document.getElementById(`cant-${i}`);
            let pVisual = document.getElementById(`p-visual-${i}`);
            let aviso = document.getElementById(`aviso-${i}`);
            let cantidad = parseInt(input.value) || 0;
            let precioEfectivo = p.precio;

            if (cantidad > p.stock) {
                cantidad = p.stock;
                input.value = p.stock;
                aviso.innerText = `Solo hay ${p.stock} disp.`;
                setTimeout(() => { aviso.innerText = ""; }, 2000);
            } else {
                aviso.innerText = "";
            }

            if (p.precioMayoreo && p.cantMinima && cantidad >= p.cantMinima) {
                precioEfectivo = p.precioMayoreo;
                pVisual.style.color = "var(--verde)";
                pVisual.innerText = `$${p.precioMayoreo} 🔥`;
            } else {
                pVisual.style.color = "var(--rosa-fuerte)";
                pVisual.innerText = `$${p.precio}`;
            }

            totalGeneral += cantidad * precioEfectivo; 
        });

        const costoDom = parseInt(document.getElementById("metodoEntrega").value);
        document.getElementById("campos-domicilio").style.display = (costoDom > 0) ? "block" : "none";
        document.getElementById('monto-total').innerText = (totalGeneral + costoDom).toLocaleString();
    }

    function enviarPedido() {
        const sel = document.getElementById("metodoEntrega");
        const zona = sel.options[sel.selectedIndex].text;
        const nombre = document.getElementById("nombreCliente").value;
        const direccion = document.getElementById("direccionCliente").value;
        
        let txt = `*🌺 PEDIDO - MÁS BELLA 🌺*\n📍 Entrega: ${zona}\n`;
        if(nombre) txt += `👤 Cliente: ${nombre}\n`;
        if(direccion) txt += `🏠 Dir: ${direccion}\n`;
        txt += `----------------------------\n`;
        
        let hayProductos = false;
        productos.forEach((p, i) => {
            const cant = parseInt(document.getElementById(`cant-${i}`).value) || 0;
            if (cant > 0) {
                let precioFinal = (p.precioMayoreo && cant >= p.cantMinima) ? p.precioMayoreo : p.precio;
                txt += `✅ ${cant}x ${p.nombre} ($${(cant * precioFinal).toLocaleString()})\n`;
                hayProductos = true;
            }
        });

        if (!hayProductos) return alert("Selecciona al menos un producto");
        txt += `\n💰 *TOTAL FINAL: $${document.getElementById("monto-total").innerText}*`;
        window.location.href = `https://wa.me/5356247880?text=${encodeURIComponent(txt)}`;
    }

    window.onload = obtenerDatos;
</script>
</body>
                        </html>
