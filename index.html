<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Inventario en Tiempo Real</title>
    <style>
        /* Estilos para que se vea bien en celulares */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        /* Contenedor de la tabla con scroll lateral para móvil */
        .contenedor-tabla {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow-x: auto; /* Permite deslizar si la tabla es ancha */
            -webkit-overflow-scrolling: touch;
        }
        iframe {
            width: 100%;
            height: 750px;
            border: none;
            border-radius: 8px;
        }
        footer {
            margin-top: 30px;
            font-size: 0.8em;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <h1>📦 Mi Inventario y Precios</h1>
    <p>Los datos se actualizan automáticamente al realizar cambios en la hoja de cálculo.</p>

    <div class="contenedor-tabla">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSh6ypXBcxssEtPYB9l6ahApz-tHFPEoi5voACOA5ynv_gxA7Uo2nzXIPtlVTTTxOeN2vqjyygpGvOI/pubhtml?widget=true&amp;headers=false"></iframe>
    </div>
    <footer>
        &copy; 2026 - Gestión de Inventario mediante Google Sheets
    </footer>

</body>
</html>
