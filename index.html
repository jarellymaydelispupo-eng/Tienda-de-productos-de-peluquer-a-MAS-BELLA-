<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÁS BELLA - Estética Profesional</title>
    <style>
        :root { --oro: #c5a059; --rosa-fondo: #fdfafb; --rosa-fuerte: #b8860b; --oscuro: #2c3e50; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: var(--rosa-fondo); color: #333; }
        
        /* Header Mejorado */
        header { background: white; padding: 25px 15px; text-align: center; border-bottom: 1px solid #eee; }
        .logo-img { width: 80%; max-width: 300px; height: auto; margin-bottom: 10px; }
        
        .lista-productos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; max-width: 700px; margin: auto; }
        .categoria-titulo { grid-column: span 2; color: var(--oro); padding: 10px 0; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; border-bottom: 1px solid #eee; margin-top: 10px; }
        
        .producto-item { background: white; display: flex; flex-direction: column; padding: 10px; border-radius: 0; border: 1px solid #f0f0f0; text-align: center; }
        .foto-producto { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 10px; }
        
        .nombre { font-size: 0.8rem; height: 36px; overflow: hidden; margin-bottom: 5px; }
        .precio { font-weight: bold; color: var(--oscuro); margin-bottom: 10px; }
        .cant-input { border: 1px solid #ddd; padding: 8px; width: 60px; margin: 0 auto; }

        /* Botones de acción */
        .resumen-total { background: #fff; border-top: 1px solid #eee; padding: 20px; position: sticky; bottom: 0; text-align: center; }
        .btn-whatsapp { background: var(--oro); color: white; text-decoration: none; padding: 15px 40px; border-radius: 0; display: inline-block; font-weight: bold; }
        
        #panel-duena { display: none; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.imgur.com/Tu_Logo_Aqui.png" alt="MÁS BELLA" class="logo-img">
        <p style="font-size: 0.7rem; color: #999; letter-spacing: 3px;">ESTÉTICA PROFESIONAL</p>
    </header>

    <div class="lista-productos" id="contenedor-productos">
        <div id="cargando" style="grid-column: span 2; text-align:center; padding:40px;">Cargando catálogo...</div>
    </div>

    <div class="resumen-total">
        <div style="margin-bottom: 15px;">TOTAL: $<span id="monto-total">0</span></div>
        <a href="javascript:void(0);" onclick="enviarPedido()" class="btn-whatsapp">FINALIZAR PEDIDO</a>
    </div>

    <script>
        // La lógica de sincronización permanece intacta
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh6ypXBcxssEtPYB9l6ahApz-tHFPEoi5voACOA5ynv_gxA7Uo2nzXIPtlVTTTxOeN2vqjyygpGvOI/pub?output=csv';
        // ... (resto del script previo)
    </script>
</body>
</html>
